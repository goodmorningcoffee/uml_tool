<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1176" height="620" viewBox="0 0 1176 620" role="img" aria-label="Web App Architecture">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
    </marker>
    <style>
      .title { font: 700 18px system-ui, -apple-system, Segoe UI, sans-serif; fill: #17202a; }
      .node-label { font: 600 13px system-ui, -apple-system, Segoe UI, sans-serif; fill: #17202a; }
      .edge-label { font: 12px system-ui, -apple-system, Segoe UI, sans-serif; fill: #334155; paint-order: stroke; stroke: #fff; stroke-width: 4px; stroke-linejoin: round; }
      .edge { stroke-width: 1.8px; stroke-linecap: round; }
      .meta { font: 11px system-ui, -apple-system, Segoe UI, sans-serif; fill: #64748b; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc" />
  <text class="title" x="18" y="30">Web App Architecture</text>
  <g><line class="edge" x1="143" y1="263" x2="428" y2="101" stroke="#64748b" marker-end="url(#arrow)"><title>loads assets</title></line><text class="edge-label" x="285.5" y="174" text-anchor="middle">loads assets</text>
<line class="edge" x1="143" y1="263" x2="428" y2="263" stroke="#64748b" marker-end="url(#arrow)"><title>API calls</title></line><text class="edge-label" x="285.5" y="255" text-anchor="middle">API calls</text>
<line class="edge" x1="428" y1="263" x2="723" y2="91" stroke="#64748b" marker-end="url(#arrow)"><title>verify token</title></line><text class="edge-label" x="575.5" y="169" text-anchor="middle">verify token</text>
<line class="edge" x1="428" y1="263" x2="718" y2="226" stroke="#64748b" marker-end="url(#arrow)"><title>read / write</title></line><text class="edge-label" x="573" y="236.5" text-anchor="middle">read / write</text>
<line class="edge" x1="428" y1="263" x2="723" y2="371" stroke="#64748b" marker-end="url(#arrow)"><title>queries</title></line><text class="edge-label" x="575.5" y="309" text-anchor="middle">queries</text>
<line class="edge" x1="428" y1="263" x2="1028" y2="243" stroke="#64748b" marker-end="url(#arrow)"><title>enqueue jobs</title></line><text class="edge-label" x="728" y="245" text-anchor="middle">enqueue jobs</text></g>
  <g><g><rect x="48" y="218" width="190" height="90" rx="10" fill="#e0f2fe" stroke="#075985" stroke-width="2"><title>Single-page app. Renders the UI and calls the [[api]] over HTTPS.</title></rect><text class="node-label" x="143" y="267" text-anchor="middle">Browser / Client</text><circle cx="225" cy="231" r="7" fill="#fef3c7" stroke="#d97706" /><text x="225" y="235" text-anchor="middle" font-size="10" fill="#92400e">i</text></g>
<g><rect x="328" y="58" width="200" height="86" rx="0" fill="#f1f5f9" stroke="#334155" stroke-width="2"><title>Serves the built frontend assets: HTML, JS, CSS, images.</title></rect><text class="node-label" x="428" y="105" text-anchor="middle">CDN / Static Host</text><circle cx="515" cy="71" r="7" fill="#fef3c7" stroke="#d97706" /><text x="515" y="75" text-anchor="middle" font-size="10" fill="#92400e">i</text></g>
<g><rect x="328" y="218" width="200" height="90" rx="10" fill="#dcfce7" stroke="#166534" stroke-width="2"><title>Business logic and request validation. Talks to the database, cache, and auth service.</title></rect><text class="node-label" x="428" y="267" text-anchor="middle">API Server</text><circle cx="515" cy="231" r="7" fill="#fef3c7" stroke="#d97706" /><text x="515" y="235" text-anchor="middle" font-size="10" fill="#92400e">i</text></g>
<g><rect x="628" y="48" width="190" height="86" rx="0" fill="#ede9fe" stroke="#6d28d9" stroke-width="2"><title>Issues and verifies tokens / sessions for the [[api]].</title></rect><text class="node-label" x="723" y="95" text-anchor="middle">Auth Service</text><circle cx="805" cy="61" r="7" fill="#fef3c7" stroke="#d97706" /><text x="805" y="65" text-anchor="middle" font-size="10" fill="#92400e">i</text></g>
<g><ellipse cx="718" cy="226" rx="90" ry="48" fill="#fef3c7" stroke="#92400e" stroke-width="2"><title>In-memory cache such as Redis for hot reads and rate limiting.</title></ellipse><text class="node-label" x="718" y="230" text-anchor="middle">Cache</text><circle cx="795" cy="191" r="7" fill="#fef3c7" stroke="#d97706" /><text x="795" y="195" text-anchor="middle" font-size="10" fill="#92400e">i</text></g>
<g><rect x="628" y="328" width="190" height="86" rx="0" fill="#cffafe" stroke="#0e7490" stroke-width="2"><title>Primary store of record, for example PostgreSQL.</title></rect><text class="node-label" x="723" y="375" text-anchor="middle">Database</text><circle cx="805" cy="341" r="7" fill="#fef3c7" stroke="#d97706" /><text x="805" y="345" text-anchor="middle" font-size="10" fill="#92400e">i</text></g>
<g><polygon points="928,188 1104,188 1128,212 1128,298 928,298" fill="#fee2e2" stroke="#991b1b" stroke-width="2"><title>Background work: sending email, generating exports, scheduled tasks.</title></polygon><polyline points="1104,188 1104,212 1128,212" fill="none" stroke="#991b1b" stroke-width="1.4" /><text class="node-label" x="1028" y="247" text-anchor="middle">Job Queue</text><circle cx="1115" cy="201" r="7" fill="#fef3c7" stroke="#d97706" /><text x="1115" y="205" text-anchor="middle" font-size="10" fill="#92400e">i</text></g></g>
  <text class="meta" x="18" y="602">9 meta link(s) in notes</text>
</svg>