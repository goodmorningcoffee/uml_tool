<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1586" height="620" viewBox="0 0 1586 620" role="img" aria-label="User Onboarding Flow">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
    </marker>
    <style>
      .title { font: 700 18px system-ui, -apple-system, Segoe UI, sans-serif; fill: #17202a; }
      .node-label { font: 600 13px system-ui, -apple-system, Segoe UI, sans-serif; fill: #17202a; }
      .edge-label { font: 12px system-ui, -apple-system, Segoe UI, sans-serif; fill: #334155; paint-order: stroke; stroke: #fff; stroke-width: 4px; stroke-linejoin: round; }
      .edge { stroke-width: 1.8px; stroke-linecap: round; }
      .meta { font: 11px system-ui, -apple-system, Segoe UI, sans-serif; fill: #64748b; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc" />
  <text class="title" x="18" y="30">User Onboarding Flow</text>
  <g><line class="edge" x1="138" y1="231" x2="388" y2="231" stroke="#64748b" marker-end="url(#arrow)"><title>start_to_enter</title></line>
<line class="edge" x1="388" y1="231" x2="643" y2="238" stroke="#64748b" marker-end="url(#arrow)"><title>enter_to_valid</title></line>
<line class="edge" x1="643" y1="238" x2="913" y2="101" stroke="#64748b" marker-end="url(#arrow)"><title>yes</title></line><text class="edge-label" x="778" y="161.5" text-anchor="middle">yes</text>
<line class="edge" x1="643" y1="238" x2="648" y2="418" stroke="#64748b" marker-end="url(#arrow)"><title>no</title></line><text class="edge-label" x="645.5" y="320" text-anchor="middle">no</text>
<line class="edge" x1="913" y1="101" x2="1173" y2="108" stroke="#64748b" marker-end="url(#arrow)"><title>send_to_verified</title></line>
<line class="edge" x1="1173" y1="108" x2="1178" y2="281" stroke="#64748b" marker-end="url(#arrow)"><title>yes</title></line><text class="edge-label" x="1175.5" y="186.5" text-anchor="middle">yes</text>
<line class="edge" x1="1173" y1="108" x2="648" y2="418" stroke="#64748b" marker-end="url(#arrow)"><title>no / expired</title></line><text class="edge-label" x="910.5" y="255" text-anchor="middle">no / expired</text>
<line class="edge" x1="1178" y1="281" x2="1438" y2="283" stroke="#64748b" marker-end="url(#arrow)"><title>create_to_welcome</title></line></g>
  <g><g><rect x="48" y="188" width="180" height="86" rx="10" fill="#dcfce7" stroke="#166534" stroke-width="2"><title>The user clicks Sign Up to begin.</title></rect><text class="node-label" x="138" y="235" text-anchor="middle">Sign Up</text><circle cx="215" cy="201" r="7" fill="#fef3c7" stroke="#d97706" /><text x="215" y="205" text-anchor="middle" font-size="10" fill="#92400e">i</text></g>
<g><rect x="288" y="188" width="200" height="86" rx="0" fill="#e0f2fe" stroke="#075985" stroke-width="2"><title>Collect credentials from the user.</title></rect><text class="node-label" x="388" y="235" text-anchor="middle">Enter Email + Password</text><circle cx="475" cy="201" r="7" fill="#fef3c7" stroke="#d97706" /><text x="475" y="205" text-anchor="middle" font-size="10" fill="#92400e">i</text></g>
<g><polygon points="643,178 738,238 643,298 548,238" fill="#fef3c7" stroke="#92400e" stroke-width="2"><title>Decision: is the email format acceptable and not already taken?</title></polygon><text class="node-label" x="643" y="242" text-anchor="middle">Email Valid?</text><circle cx="725" cy="191" r="7" fill="#fef3c7" stroke="#d97706" /><text x="725" y="195" text-anchor="middle" font-size="10" fill="#92400e">i</text></g>
<g><rect x="808" y="58" width="210" height="86" rx="0" fill="#e0f2fe" stroke="#075985" stroke-width="2"><title>Email a one-time verification link.</title></rect><text class="node-label" x="913" y="105" text-anchor="middle">Send Verification Email</text><circle cx="1005" cy="71" r="7" fill="#fef3c7" stroke="#d97706" /><text x="1005" y="75" text-anchor="middle" font-size="10" fill="#92400e">i</text></g>
<g><polygon points="548,368 724,368 748,392 748,468 548,468" fill="#fee2e2" stroke="#991b1b" stroke-width="2"><title>Display an inline error and let the user try again.</title></polygon><polyline points="724,368 724,392 748,392" fill="none" stroke="#991b1b" stroke-width="1.4" /><text class="node-label" x="648" y="422" text-anchor="middle">Show Error</text><circle cx="735" cy="381" r="7" fill="#fef3c7" stroke="#d97706" /><text x="735" y="385" text-anchor="middle" font-size="10" fill="#92400e">i</text></g>
<g><polygon points="1173,48 1268,108 1173,168 1078,108" fill="#fef3c7" stroke="#92400e" stroke-width="2"><title>Decision: did the user click the link before it expired?</title></polygon><text class="node-label" x="1173" y="112" text-anchor="middle">Verified In Time?</text><circle cx="1255" cy="61" r="7" fill="#fef3c7" stroke="#d97706" /><text x="1255" y="65" text-anchor="middle" font-size="10" fill="#92400e">i</text></g>
<g><rect x="1078" y="238" width="200" height="86" rx="0" fill="#dcfce7" stroke="#166534" stroke-width="2"><title>Persist the account and starter profile.</title></rect><text class="node-label" x="1178" y="285" text-anchor="middle">Create Account</text><circle cx="1265" cy="251" r="7" fill="#fef3c7" stroke="#d97706" /><text x="1265" y="255" text-anchor="middle" font-size="10" fill="#92400e">i</text></g>
<g><rect x="1338" y="238" width="200" height="90" rx="10" fill="#cffafe" stroke="#0e7490" stroke-width="2"><title>Send the user into the product for the first time.</title></rect><text class="node-label" x="1438" y="287" text-anchor="middle">Welcome Screen</text><circle cx="1525" cy="251" r="7" fill="#fef3c7" stroke="#d97706" /><text x="1525" y="255" text-anchor="middle" font-size="10" fill="#92400e">i</text></g></g>
  
</svg>